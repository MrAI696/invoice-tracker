<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <!-- Disable zoom completely -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / Fullscreen -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="كشوفاتي" />

  <!-- Theme color for Android -->
  <meta name="theme-color" content="#0E0E0F" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <title>كشوفاتي</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <div id="toast-container"></div>

  <div id="modal-overlay">
    <div id="modal-sheet"></div>
  </div>

  <div id="app">
    <header class="header">
      <div class="header-top">
        <span id="app-title" class="app-title">كشوفاتي</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon"></span>
        <input id="search-input" type="search" placeholder="ابحث عن كشف..."
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </div>
    </header>

    <!-- Main tab -->
    <main class="main tab-view" data-view="main">
      <div id="sheets-container"></div>
    </main>

    <!-- Suppliers tab -->
    <div class="main tab-view" data-view="suppliers" hidden>
      <div id="suppliers-container"></div>
    </div>

    <!-- Settings tab -->
    <div class="main tab-view" data-view="settings" hidden>
      <div id="settings-container"></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn tab-btn--active" data-tab="main">
      <span class="tab-icon" id="tab-icon-main"></span>
      <span class="tab-label">الرئيسية</span>
    </button>
    <button class="tab-btn" data-tab="suppliers">
      <span class="tab-icon" id="tab-icon-suppliers"></span>
      <span class="tab-label">الموردون</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon" id="tab-icon-settings"></span>
      <span class="tab-label">الإعدادات</span>
    </button>
  </nav>

  <div class="fab-wrap">
    <button id="fab" class="fab">
      <span id="fab-icon"></span>
      <span id="fab-label">إنشاء كشف</span>
    </button>
  </div>

  <script src="components/icons.js"></script>
  <script src="core/db.js"></script>
  <script src="core/i18n.js"></script>
  <script src="components/toast.js"></script>
  <script src="components/modal.js"></script>
  <script src="components/search.js"></script>
  <script src="components/tabs.js"></script>
  <script src="core/app.js"></script>

</body>
</html>
